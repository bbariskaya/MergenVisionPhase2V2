services:
  postgres:
    image: postgres:16.3-alpine
    container_name: mergenvision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mergenvision
      POSTGRES_USER: mergenvision
      POSTGRES_PASSWORD: mergenvision
    ports:
      - "5433:5432"
    volumes:
      - mergenvision_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mergenvision -d mergenvision"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: mergenvision-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - mergenvision_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: mergenvision-qdrant
    restart: unless-stopped
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - mergenvision_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: mergenvision-backend:gpu
    build:
      context: .
      dockerfile: backend/Dockerfile.gpu
    container_name: mergenvision-backend-gpu
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://mergenvision:mergenvision@postgres:5432/mergenvision
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET_NAME: mergenvision-face-samples
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: face_samples_retinaface_r50_glintr100_v1
      MODEL_VERSION: retinaface_r50_glintr100_v1
      LOG_LEVEL: INFO
    ports:
      - "8090:8000"
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  mergenvision_postgres_data:
  mergenvision_minio_data:
  mergenvision_qdrant_data:
