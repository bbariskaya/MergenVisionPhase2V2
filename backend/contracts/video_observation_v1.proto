syntax = "proto3";

package mergenvision.video.v1;

option go_package = "github.com/mergenvision/backend/contracts/video/v1";

// Compact observation emitted by the M5 native video worker.
// One record is written per sampled frame, even when zero faces are detected.
message VideoObservationFrame {
  string job_id = 1;
  string video_id = 2;
  int32 stream_index = 3;
  int64 frame_index = 4;        // display order
  int64 source_pts = 5;
  int64 time_base_num = 6;
  int64 time_base_den = 7;
  int64 pts_ns = 8;             // canonical integer presentation timestamp
  int32 display_width = 9;
  int32 display_height = 10;
  int32 rotation = 11;

  repeated FaceDetection detections = 12;
}

message FaceDetection {
  // Deterministic within the frame; composite of job_id + frame_index + ordinal
  // makes the detection_id globally deterministic for idempotency/retry.
  string detection_id = 1;
  int32 ordinal = 2;

  // Original display-space pixel coordinates.
  int32 x = 3;
  int32 y = 4;
  int32 width = 5;
  int32 height = 6;

  // Five facial landmarks in original display-space pixel coordinates.
  // Order: left eye, right eye, nose, left mouth corner, right mouth corner.
  repeated float landmarks = 7;  // length == 10

  float detector_score = 8;
  float quality_score = 9;

  bool tracking_eligible = 10;
  bool recognition_eligible = 11;

  // Empty when recognition_eligible == false.
  string rejection_code = 12;

  // 512-D L2-normalized embedding; present only when recognition_eligible.
  repeated float embedding = 13;  // length == 512

  string model_version = 14;
  string preprocess_version = 15;
}

// Footer written at the end of a chunk for deterministic verification.
message ObservationChunkFooter {
  string job_id = 1;
  int64 sequence_no = 2;
  int64 frame_count = 3;
  int64 sha256_prefix = 4;
}
