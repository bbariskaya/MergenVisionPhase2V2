services:
  postgres-test:
    image: postgres:16.3-alpine
    env_file: backend/.env.test
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - mergenvision_s01_test_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-test:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address ":9001"
    env_file: backend/.env.test
    ports:
      - "127.0.0.1:59000:9000"
      - "127.0.0.1:59001:9001"
    volumes:
      - mergenvision_s01_test_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant-test:
    image: qdrant/qdrant:v1.18.2
    ports:
      - "127.0.0.1:56333:6333"
      - "127.0.0.1:56334:6334"
    volumes:
      - mergenvision_s01_test_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mergenvision_s01_test_postgres_data:
  mergenvision_s01_test_minio_data:
  mergenvision_s01_test_qdrant_data:
