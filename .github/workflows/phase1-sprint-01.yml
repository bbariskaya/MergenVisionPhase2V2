name: Phase 1 Sprint 01 Acceptance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.lock

      - name: Start test infrastructure
        run: |
          docker compose -p mergenvision-s01-test -f docker-compose.test.yml up -d --wait

      - name: Run Alembic migrations
        run: |
          set -a
          source backend/.env.test
          set +a
          cd backend
          python -m alembic upgrade head

      - name: Run static analysis
        run: |
          cd backend
          python -m ruff check .
          python -m ruff format --check .
          python -m mypy .

      - name: Run full test suite
        run: |
          set -a
          source backend/.env.test
          set +a
          cd backend
          python -m pytest -v

      - name: Check for whitespace errors
        run: git diff --check

      - name: Stop test infrastructure
        if: always()
        run: |
          docker compose -p mergenvision-s01-test -f docker-compose.test.yml down
